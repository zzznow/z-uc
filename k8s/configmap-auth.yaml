apiVersion: v1
kind: ConfigMap
metadata:
  name: z-uc-auth-config
data:
  application-prod.yml: |
    name: "auth"
    mode: "release"
    port: 80
    host: "0.0.0.0"
    mysql:
      host: "mysql.svc.cluster.local"
      port: 3306
      user: "${MYSQL_USER}"
      passwd: "${MYSQL_PASSWD}"
      dbname: "${MYSQL_DB}"
      max_open_conns: 17
      max_idle_conns: 8
    redis:
      host: "redis.svc.cluster.local"
      port: 6379
      db: 0
      passwd: "${REDIS_PASSWD}"
      pool_size: 100
