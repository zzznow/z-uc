<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>
<link rel="stylesheet" href="/html/common.css">
</head>
<body>
<div class="container">
  <div class="card">
    <div class="card-title">Create Account</div>

    <form id="signup-form" autocomplete="off">
      <div class="form-group">
        <label>Username</label>
        <input class="form-input" type="text" id="signup-name" placeholder="Choose a username" autocomplete="username" required>
        <div class="form-error" id="name-error"></div>
      </div>

      <div class="form-group" id="email-group">
        <label>Email</label>
        <input class="form-input" type="email" id="signup-email" placeholder="Enter your email" autocomplete="email">
        <div class="form-error" id="email-error"></div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input class="form-input" type="password" id="signup-password" placeholder="6-20 characters" autocomplete="new-password" required>
        <div class="form-error" id="password-error"></div>
      </div>

      <div class="form-group">
        <label>Confirm Password</label>
        <input class="form-input" type="password" id="signup-password2" placeholder="Enter password again" autocomplete="new-password" required>
        <div class="form-error" id="password2-error"></div>
      </div>

      <div class="agreement">
        <input type="checkbox" id="agreement-check" required>
        <span>I have read and agree to the <a href="/UserAgreement.html" target="_blank">Terms</a></span>
      </div>

      <button class="btn btn-primary" type="submit" id="signup-btn">Create Account</button>
    </form>

    <div class="divider">or sign up with</div>

    <div class="third-party">
      <div class="third-party-icon" id="wx-signup" title="WeChat">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="#07C160"><path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.047c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 0 1-.023-.156.49.49 0 0 1 .201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.952-7.062-6.122zm-3.228 3.07c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982z"/></svg>
      </div>
      <div class="third-party-icon" id="google-signup" title="Google">
        <svg width="22" height="22" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.76c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      </div>
    </div>

    <div class="footer-link">
      Already have an account? <a href="/signin/login.html">Sign In</a>
    </div>
  </div>
</div>

<script src="/html/common.js"></script>
<script>
(function () {
  var form = document.getElementById('signup-form');
  var btn = document.getElementById('signup-btn');
  var signUpUrl = getQuery('signup_api') || 'http://localhost:4461/register';

  function showFieldError(id, msg) {
    var el = document.getElementById(id + '-error');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('signup-' + id).classList.add('error');
  }

  form.addEventListener('submit', function (e) {
    e.preventDefault();
    var name = document.getElementById('signup-name').value.trim();
    var email = document.getElementById('signup-email').value.trim();
    var pass = document.getElementById('signup-password').value;
    var pass2 = document.getElementById('signup-password2').value;
    var agreed = document.getElementById('agreement-check').checked;

    document.querySelectorAll('.form-error').forEach(function (el) { el.classList.remove('show'); });
    document.querySelectorAll('.form-input').forEach(function (el) { el.classList.remove('error'); });

    if (!name) { showFieldError('name', 'Please enter a username'); return; }
    if (name.length < 2) { showFieldError('name', 'Username must be at least 2 characters'); return; }
    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showFieldError('email', 'Invalid email format'); return; }
    if (!pass || pass.length < 6) { showFieldError('password', 'Password must be at least 6 characters'); return; }
    if (pass !== pass2) { showFieldError('password2', 'Passwords do not match'); return; }
    if (!agreed) { showToast('Please agree to the terms first'); return; }

    setLoading(btn, true);
    postJSON(signUpUrl, {
      type: 'USERNAME',
      username: name,
      password: pass,
      email: email
    }).then(function (res) {
      if (res.data) {
        saveToken(res.data);
        showToast('Account created successfully');
        setTimeout(function () {
          location.replace('/access/access.html?sn=' + encodeURIComponent(res.data.sn));
        }, 800);
      } else {
        showToast(res.error || 'Registration failed');
      }
    }).catch(function () {
      showToast('Network error, please try again');
    }).finally(function () {
      setLoading(btn, false);
    });
  });

  document.getElementById('wx-signup').addEventListener('click', function () {
    showToast('Please use WeChat login in the sign in page');
  });

  document.getElementById('google-signup').addEventListener('click', function () {
    location.replace('/google/google.html');
  });
})();
</script>
</body>
</html>
